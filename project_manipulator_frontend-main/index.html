              fill="black" />
          </svg>
        </div>
        <div class="left-panel__menu">
          <ul class="left-panel__menu-list" data-js-menu-list>
            <li class="left-panel__menu-item">
              <button class="left-panel__menu-button" data-js-button href="#" style="text-decoration: line-through;">
                Manual control
              </button>
            </li>
          </ul>
        </div>
      </div>
      <div class="screen__container">
        <header class="header">
          <div class="header__title-wrapper">
            <h1 class="header__title">Moving panel</h1>
          </div>
          <div class="header__web-controls">
            <div class="header__web-controls-connection-tile">
              <p>not connected</p>
            </div>
            <button class="header__web-controls-console-button">
              Console
            </button>
          </div>
        </header>
        <div class="screen__content screen__content--moving-panel">
          <div class="moving-panel">
            <div class="desks" data-js-desks>

            </div>
            <div class="controls">
              <button class="controls__button">
                TO DEFAULT
              </button>
              <button class="controls__button controls__button--green" data-js-move-button>
                MOVE
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="console-screen">
      <div class="console">
        <div class="console-message console-message--post">
          <span class="console-message-dash">-</span>
          <span class="console-message-method">POST</span>
          <span class="console-message-result"></span>
          <span class="console-message-comment">“3, 7, 2, 4, 5, 2”</span>
        </div>
        <div class="console-message console-message--get-success">
          <span class="console-message-dash">-</span>
          <span class="console-message-method">GET</span>
          <span class="console-message-result">Success</span>
          <span class="console-message-comment"></span>
        </div>
        <div class="console-message console-message--post">
          <span class="console-message-dash">-</span>
          <span class="console-message-method">POST</span>
          <span class="console-message-result"></span>
          <span class="console-message-comment">“4, 7, 2, 4, 5, 2”</span>
        </div>
        <div class="console-message console-message--get-error">
          <span class="console-message-dash">-</span>
          <span class="console-message-method">GET</span>
          <span class="console-message-result">Error</span>
          <span class="console-message-comment">- “this place is already occupied”</span>
        </div>
      </div>
    </div>
  </main>

</body>

</html>
